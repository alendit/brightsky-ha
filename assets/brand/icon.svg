  </g>
  <g fill="#D9F2FF">
    <path d="M86 184c8 12 12 20 12 26a12 12 0 0 1-24 0c0-6 4-14 12-26z"/>
    <path d="M128 185c8 12 12 20 12 26a12 12 0 0 1-24 0c0-6 4-14 12-26z"/>
    <path d="M170 184c8 12 12 20 12 26a12 12 0 0 1-24 0c0-6 4-14 12-26z"/>
