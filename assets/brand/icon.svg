<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Bright Sky icon</title>
  <desc id="desc">A bright sun over a white cloud with blue precipitation drops.</desc>
  <defs>
    <linearGradient id="sky" x1="48" y1="28" x2="208" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67C9FF"/>
      <stop offset="1" stop-color="#1C74D8"/>
    </linearGradient>
    <linearGradient id="sun" x1="151" y1="43" x2="211" y2="111" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE66E"/>
      <stop offset="1" stop-color="#FFB72E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#0B3D73" flood-opacity="0.22"/>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="112" fill="url(#sky)"/>
  <circle cx="181" cy="77" r="31" fill="url(#sun)"/>
  <g fill="#FFFFFF" filter="url(#shadow)">
